<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title></title>
<style>
* {
box-sizing: border-box;
}

html,
body {
width: 100%;
height: 100%;
margin: 0;
overflow: hidden;
}

body {
display: grid;
place-items: center;
background-color: #000;
background-image: url("space-bg.jpg");
background-position: center center;
background-size: cover;
background-repeat: no-repeat;
}

.star-field {
position: fixed;
inset: 0;
z-index: 0;
pointer-events: none;
}

.star {
position: absolute;
top: var(--y);
left: var(--x);
width: var(--size);
height: var(--size);
border-radius: 50%;
color: var(--color);
background: currentColor;
animation: breathe-star 4s ease-in-out var(--delay) infinite;
will-change: opacity, transform, filter;
}

.approach {
position: fixed;
top: 8vh;
left: 8vw;
z-index: 1;
width: min(68vmin, 680px);
aspect-ratio: 1;
transform: translate(-50%, -50%) scale(.02);
transform-origin: center;
animation: approach-earth 7s linear forwards;
will-change: top, left, transform;
}

.earth {
position: relative;
width: 100%;
height: 100%;
overflow: hidden;
border-radius: 50%;
animation: rotate-earth 60s linear infinite;
will-change: transform;
}

.earth img {
position: absolute;
top: -74%;
left: 50%;
width: 151%;
height: auto;
display: block;
transform: translateX(-50%);
pointer-events: none;
user-select: none;
}

@keyframes rotate-earth {
to {
transform: rotate(360deg);
}
}

@keyframes approach-earth {
from {
top: 8vh;
left: 8vw;
transform: translate(-50%, -50%) scale(.02);
}

to {
top: 50vh;
left: 50vw;
transform: translate(-50%, -50%) scale(1);
}
}

@keyframes breathe-star {
0%,
100% {
opacity: .22;
filter: brightness(.9);
transform: scale(.82);
}

50% {
opacity: 1;
filter: brightness(2.1);
transform: scale(1.35);
}
}
</style>
</head>
