<!doctype html>
<html lang =" zh-CN ">
<head>
<meta charset =" utf-8 ">
<meta name =" viewport " content =" width=device-width, initial-scale=1 ">
<title> </title>
<style>
* {
box-sizing: border-box;
}

html，
身体 {
宽度：100%；
高度：100%；
边距：0；
溢出：隐藏；
}

身体 {
显示方式：网格；
放置物品：中心；
背景颜色：#000；
background-image: url("space-bg.jpg");
background-position: center center;
background-size: cover;
background-repeat: no-repeat;
}

.星空{
位置：固定；
插入：0；
z-index：0；
指针事件：无；
}

。星星 {
位置：绝对定位；
顶部：var(--y);
左：var(--x);
宽度：var(--size);
高度：var(--size);
圆角半径：50%；
颜色：var(--color);
背景色：当前颜色；
动画：breathe-star 4s ease-in-out var(--delay) infinite;
将会改变：不透明度、变换、滤镜；
}

。方法 {
位置：固定；
顶部：8vh；
左：8vw；
z-index：1；
宽度：最小值(68vmin, 680px);
宽高比：1；
变换：平移(-50%, -50%) 缩放(.02);
transform-origin: center;
动画：接近地球 7 秒线性向前；
将会改变：顶部，左侧，转变；
}

。地球 {
位置：相对；
宽度：100%；
高度：100%；
溢出：隐藏；
圆角半径：50%；
动画：旋转地球 60 秒 线性无限；
会改变：转变；
}

.earth img {
位置：绝对定位；
最高：-74%；
左侧：50%；
宽度：151%；
高度：自动；
显示：块；
变换：translateX(-50%)；
指针事件：无；
用户选择：无；
}

@keyframes rotate-earth {
到 {
变换：旋转（360度）；
}
}

@keyframes approach-earth {
从 {
顶部：8vh；
左：8vw；
变换：平移(-50%, -50%) 缩放(.02);
}

到 {
顶部：50vh；
左：50vw；
transform: translate(-50%, -50%) scale(1);
}
}

@keyframes 呼吸星形 {
0%，
100% {
不透明度：0.22；
滤镜：亮度(.9)；
变换：缩放（.82）；
}

50% {
不透明度：1；
滤镜：亮度(2.1)；
变换：缩放（1.35）；
}
}
</style>
</head>
