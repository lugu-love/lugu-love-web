<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title></title>
<style>
* {
box-sizing: border-box;
}

html,
body {
width: 100%;
height: 100%;
margin: 0;
overflow: hidden;
}

body {
display: grid;
place-items: center;
background-color: #000;
background-image: url("space-bg.webp");
background-position: center center;
background-size: cover;
background-repeat: no-repeat;
}

.star-field {
position: fixed;
inset: 0;
z-index: 0;
pointer-events: none;
}

.place-mark {
position: fixed;
top: 28px;
left: 32px;
z-index: 2;
color: rgba(255, 244, 214, .78);
font-family: "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
font-size: clamp(14px, 1.5vw, 20px);
font-weight: 300;
line-height: 1.55;
letter-spacing: .08em;
text-shadow: 0 0 12px rgba(255, 236, 184, .45);
pointer-events: none;
}

.place-mark span {
display: block;
font-size: .72em;
letter-spacing: .16em;
color: rgba(255, 255, 255, .62);
}

.star {
position: absolute;
top: var(--y);
left: var(--x);
width: var(--size);
height: var(--size);
border-radius: 50%;
color: var(--color);
background: currentColor;
animation: breathe-star 4s ease-in-out var(--delay) infinite;
will-change: opacity, transform, filter;
}

.voice-star-layer {
position: fixed;
inset: 0;
z-index: 2;
pointer-events: none;
overflow: hidden;
}

.voice-star {
position: absolute;
left: 0;
top: 0;
width: var(--voice-size);
height: var(--voice-size);
padding: 0;
border: 0;
background: transparent;
opacity: 0;
transform: translate3d(var(--voice-x), var(--voice-y), 0) scale(.18);
transform-origin: center;
pointer-events: auto;
cursor: pointer;
will-change: transform, opacity, filter;
}

.voice-star::before {
content: "";
position: absolute;
inset: -150%;
border-radius: 50%;
background: radial-gradient(circle, var(--voice-glow) 0%, var(--voice-haze) 28%, rgba(255, 255, 255, 0) 70%);
opacity: .76;
filter: blur(2.5px);
}

.voice-star::after {
content: "";
position: absolute;
inset: 12%;
border-radius: 50%;
background: radial-gradient(circle, #fff 0 18%, var(--voice-core) 44%, rgba(255, 255, 255, 0) 76%);
box-shadow: 0 0 16px var(--voice-core), 0 0 26px var(--voice-glow);
opacity: 1;
}

.voice-star-shape {
position: absolute;
inset: -8%;
border-radius: 34%;
background:
radial-gradient(circle at 50% 50%, #fff 0 11%, var(--voice-core) 19%, rgba(255, 255, 255, 0) 40%),
linear-gradient(135deg, rgba(255, 255, 255, .96), var(--voice-color) 46%, var(--voice-deep) 100%);
clip-path: polygon(50% 0, 56% 41%, 100% 50%, 56% 59%, 50% 100%, 44% 59%, 0 50%, 44% 41%);
filter: drop-shadow(0 0 9px var(--voice-core)) drop-shadow(0 0 24px var(--voice-glow));
}

.voice-star.is-touched {
pointer-events: none;
filter: brightness(3.4) saturate(1.6);
animation: touched-star-flare 2s ease forwards;
}

.voice-star.is-touched::before {
inset: -180%;
background: radial-gradient(circle, var(--voice-glow) 0%, rgba(255, 255, 255, .3) 30%, rgba(255, 255, 255, 0) 70%);
opacity: 1;
filter: blur(1.5px) drop-shadow(0 0 18px var(--voice-glow));
animation: touched-star-halo 2s ease forwards;
}

.voice-star.is-touched::after {
inset: 4%;
box-shadow: 0 0 22px #fff, 0 0 42px var(--voice-glow), 0 0 70px var(--voice-color);
animation: touched-star-core 2s ease forwards;
}

.voice-star.is-touched .voice-star-shape {
animation: touched-star-shape 2s ease forwards;
}

@keyframes touched-star-flare {
0%,
100% {
opacity: 1;
}

35%,
68% {
opacity: .72;
}
}

@keyframes touched-star-halo {
0% {
opacity: .42;
transform: scale(.55);
}

35%,
72% {
opacity: .95;
transform: scale(1.08);
}

100% {
opacity: 0;
transform: scale(1.24);
}
}

@keyframes touched-star-core {
0% {
opacity: .72;
transform: scale(.8);
}

35%,
72% {
opacity: 1;
transform: scale(1.18);
}

100% {
opacity: .18;
transform: scale(.72);
}
}

@keyframes touched-star-shape {
0% {
filter: drop-shadow(0 0 9px var(--voice-core)) drop-shadow(0 0 24px var(--voice-glow));
transform: scale(1);
}

35%,
72% {
filter: drop-shadow(0 0 18px #fff) drop-shadow(0 0 42px var(--voice-glow));
transform: scale(1.35);
}

100% {
filter: drop-shadow(0 0 8px var(--voice-core));
transform: scale(.7);
}
}

.voice-bottle {
position: fixed;
left: 0;
top: 0;
z-index: 4;
width: min(74vw, 103px);
height: 130px;
color: rgba(91, 58, 28, .9);
font-family: "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
font-size: 13px;
letter-spacing: .04em;
text-align: center;
opacity: 0;
transform: translate3d(var(--bottle-x), calc(var(--bottle-y) - 12px), 0) rotate(-24deg) scale(.1);
pointer-events: auto;
animation: bottle-arrive var(--bottle-arrive) linear forwards;
filter: drop-shadow(0 0 18px rgba(118, 201, 255, .28)) drop-shadow(0 0 30px rgba(255, 205, 116, .46));
}

.voice-bottle.is-closing {
pointer-events: none;
animation: bottle-close 2s ease forwards;
}

.voice-bottle-glass {
position: absolute;
left: 50%;
bottom: 54px;
z-index: 4;
width: 64px;
height: 97px;
border: 2px solid rgba(255, 244, 218, .76);
border-radius: 35px 35px 22px 22px / 43px 43px 20px 20px;
background:
linear-gradient(90deg, rgba(255, 255, 255, .34), rgba(255, 255, 255, .04) 20%, rgba(103, 195, 255, .18) 46%, rgba(255, 233, 190, .2) 78%, rgba(255, 255, 255, .28)),
radial-gradient(ellipse at 24% 16%, rgba(255, 255, 255, .72), rgba(255, 255, 255, 0) 30%),
radial-gradient(ellipse at 72% 68%, rgba(255, 255, 255, .2), rgba(255, 255, 255, 0) 36%),
radial-gradient(circle at 68% 88%, rgba(255, 188, 80, .48), rgba(255, 188, 80, 0) 34%);
box-shadow:
inset 0 0 24px rgba(255, 255, 255, .34),
inset 12px 0 16px rgba(255, 255, 255, .22),
inset -10px 0 14px rgba(80, 169, 255, .12),
0 0 24px rgba(125, 207, 255, .24),
0 0 28px rgba(255, 204, 117, .42);
transform: translateX(-50%);
}

.voice-bottle-glass::before {
content: "";
position: absolute;
left: 50%;
top: -26px;
width: 28px;
height: 33px;
border: 2px solid rgba(255, 244, 218, .76);
border-bottom: 0;
border-radius: 14px 14px 5px 5px;
background:
linear-gradient(90deg, rgba(255, 255, 255, .34), rgba(125, 193, 255, .12), rgba(255, 238, 202, .24)),
radial-gradient(ellipse at 28% 18%, rgba(255, 255, 255, .62), transparent 40%);
box-shadow: inset 0 0 16px rgba(255, 255, 255, .24), 0 0 20px rgba(255, 211, 132, .32);
transform: translateX(-50%);
}

.voice-bottle-glass::after {
content: "";
position: absolute;
left: 50%;
bottom: 5px;
width: 48px;
height: 12px;
border-radius: 50%;
border: 1px solid rgba(255, 236, 196, .52);
background: radial-gradient(ellipse, rgba(255, 238, 191, .5), rgba(255, 238, 191, 0) 68%);
box-shadow: inset 0 0 8px rgba(255, 255, 255, .28), 0 0 12px rgba(255, 199, 100, .34);
transform: translateX(-50%);
}

.voice-bottle-shine {
position: absolute;
left: 30px;
top: 3px;
z-index: 3;
width: 12px;
height: 48px;
border-radius: 999px;
background: linear-gradient(rgba(255, 255, 255, .72), rgba(255, 255, 255, .06));
filter: blur(.3px);
opacity: .72;
transform: rotate(16deg);
}

.voice-bottle-sparkle {
position: absolute;
z-index: 6;
width: 10px;
height: 10px;
opacity: .86;
filter: drop-shadow(0 0 8px rgba(255, 226, 158, .76));
}

.voice-bottle-sparkle::before,
.voice-bottle-sparkle::after {
content: "";
position: absolute;
left: 50%;
top: 50%;
background: rgba(255, 247, 219, .92);
transform: translate(-50%, -50%);
}

.voice-bottle-sparkle::before {
width: 100%;
height: 2px;
border-radius: 999px;
}

.voice-bottle-sparkle::after {
width: 2px;
height: 100%;
border-radius: 999px;
}

.voice-bottle-sparkle.one {
left: 28px;
top: 6px;
}

.voice-bottle-sparkle.two {
right: 22px;
bottom: 78px;
transform: scale(.72);
opacity: .7;
}

.voice-bottle-origin {
display: block;
position: absolute;
left: calc(50% + 46px);
top: 68px;
max-width: 112px;
opacity: 0;
color: #fff;
font-family: "Kaiti SC", "STKaiti", "KaiTi", "Songti SC", cursive;
font-size: 11px;
line-height: 1.35;
text-align: left;
text-shadow: 0 1px 2px rgba(0, 0, 0, .32);
white-space: normal;
overflow-wrap: anywhere;
animation: origin-show 1.5s ease var(--letter-delay) forwards;
}

.voice-letter {
position: absolute;
left: 50%;
top: 56px;
z-index: 4;
width: 34px;
min-height: 50px;
padding: 16px 18px 52px;
border: 1px solid transparent;
border-radius: 8px;
background: transparent;
box-shadow: none;
backdrop-filter: none;
-webkit-backdrop-filter: none;
line-height: 1.6;
transform: translateX(-50%) rotate(var(--letter-tilt)) scale(.46);
opacity: 0;
overflow: hidden;
animation: letter-float-out 1.5s ease var(--letter-delay) forwards;
}

.voice-letter::before,
.voice-letter::after {
content: "";
position: absolute;
left: 50%;
width: 40px;
height: 10px;
border-radius: 50%;
background: rgba(207, 157, 79, .55);
opacity: 0;
transform: translateX(-50%);
}

.voice-letter::before {
top: -10px;
}

.voice-letter::after {
bottom: -10px;
}

.voice-bottle-tie {
position: absolute;
left: 50%;
top: 39px;
z-index: 6;
width: 43px;
height: 7px;
border-top: 2px solid rgba(101, 55, 23, .82);
border-bottom: 1px solid rgba(101, 55, 23, .5);
border-radius: 50%;
transform: translateX(-50%);
animation: twine-release 1.5s ease var(--letter-delay) forwards;
}

.voice-bottle-heart {
position: absolute;
left: 50%;
top: 30px;
z-index: 5;
width: 22px;
height: 22px;
transform: translateX(-50%);
filter: drop-shadow(0 0 12px rgba(235, 252, 255, 1)) drop-shadow(0 0 30px rgba(111, 222, 255, .86)) drop-shadow(0 0 48px rgba(86, 142, 255, .48));
animation: glowing-heart-hold 1.5s ease var(--letter-delay) forwards;
background:
linear-gradient(45deg, transparent 47%, rgba(255, 255, 255, .62) 48% 52%, transparent 53%),
linear-gradient(-45deg, transparent 45%, rgba(130, 224, 255, .46) 46% 54%, transparent 55%),
linear-gradient(120deg, transparent 0 28%, rgba(255, 255, 255, .84) 29% 34%, transparent 35%),
linear-gradient(230deg, transparent 0 34%, rgba(92, 190, 255, .44) 35% 42%, transparent 43%),
linear-gradient(135deg, rgba(238, 252, 255, .96), rgba(91, 210, 255, .72) 52%, rgba(83, 122, 255, .66));
box-shadow: inset 0 0 10px rgba(255, 255, 255, .58), inset -4px -5px 9px rgba(54, 111, 210, .18), 0 0 22px rgba(183, 244, 255, .96), 0 0 42px rgba(92, 171, 255, .62);
outline: 1px solid rgba(239, 254, 255, .62);
outline-offset: -1px;
clip-path: polygon(50% 0, 62% 18%, 82% 18%, 100% 39%, 50% 100%, 0 39%, 18% 18%, 38% 18%);
}

.voice-bottle-heart .diamond-facet {
position: absolute;
inset: -1px;
z-index: 2;
border-radius: 12% 12% 16% 16%;
background:
linear-gradient(90deg, transparent 48%, rgba(255, 255, 255, .84) 49% 51%, transparent 52%),
linear-gradient(0deg, transparent 48%, rgba(255, 255, 255, .38) 49% 51%, transparent 52%),
linear-gradient(135deg, transparent 30%, rgba(255, 255, 255, .56) 31% 34%, transparent 35%),
linear-gradient(45deg, transparent 29%, rgba(68, 174, 255, .4) 30% 34%, transparent 35%),
conic-gradient(from 45deg, rgba(255, 255, 255, .42), rgba(105, 218, 255, .18), rgba(255, 255, 255, .52), rgba(69, 128, 255, .22), rgba(255, 255, 255, .42));
clip-path: polygon(50% 0, 68% 20%, 100% 50%, 70% 70%, 50% 100%, 30% 70%, 0 50%, 32% 20%);
mix-blend-mode: screen;
pointer-events: none;
}

.voice-bottle-heart::before,
.voice-bottle-heart::after {
content: "";
position: absolute;
border-radius: 0;
background:
linear-gradient(135deg, rgba(255, 255, 255, .74), rgba(95, 210, 255, .18));
box-shadow: none;
pointer-events: none;
}

.voice-bottle-heart::before {
left: 5px;
top: 4px;
width: 12px;
height: 18px;
clip-path: polygon(50% 0, 100% 100%, 0 100%);
}

.voice-bottle-heart::after {
left: 2px;
top: 7px;
width: 18px;
height: 12px;
clip-path: polygon(0 0, 100% 0, 50% 100%);
}

.voice-bottle-heart-rays {
position: absolute;
left: 50%;
top: 30px;
z-index: 4;
width: 70px;
height: 70px;
border-radius: 50%;
background:
conic-gradient(from 4deg, rgba(238, 252, 255, .96) 0 5deg, transparent 5deg 22deg, rgba(125, 224, 255, .78) 22deg 28deg, transparent 28deg 52deg),
radial-gradient(circle, rgba(236, 252, 255, .5), rgba(100, 210, 255, .18) 38%, transparent 66%);
mix-blend-mode: screen;
opacity: .78;
filter: blur(.4px) drop-shadow(0 0 16px rgba(133, 228, 255, .72));
pointer-events: none;
transform: translate(-50%, -50%);
animation: heart-rays-flare 1.5s ease var(--letter-delay) forwards;
}

.voice-letter-time {
position: absolute;
right: 18px;
top: 16px;
color: #fff;
font-family: "Songti SC", "SimSun", serif;
font-size: 10px;
letter-spacing: .04em;
white-space: nowrap;
}

.voice-letter-brand {
position: absolute;
left: 18px;
top: 15px;
color: #fff;
font-family: "Songti SC", "SimSun", serif;
font-size: 12px;
font-weight: 600;
line-height: 1.45;
letter-spacing: .04em;
}

.voice-letter-brand span {
display: block;
font-size: 9px;
font-weight: 400;
letter-spacing: .02em;
}

.voice-letter-text {
position: absolute;
left: 50%;
top: 24px;
display: block;
width: min(78%, 268px);
min-height: 62px;
color: #fff;
font-family: var(--hand-font);
font-style: italic;
font-size: 18px;
line-height: var(--hand-line-height);
letter-spacing: var(--hand-letter-spacing);
transform: translateX(-50%) skewX(var(--hand-skew));
text-align: left;
}

.voice-letter-text span {
display: inline-block;
transform: translate(var(--char-x), var(--char-y)) rotate(var(--char-rotate));
}

.voice-letter-text.is-typing::after {
content: "......";
display: inline-block;
position: relative;
top: .45em;
width: auto;
height: auto;
margin-left: 3px;
background: transparent;
color: #fff;
overflow: hidden;
white-space: nowrap;
vertical-align: baseline;
animation: type-caret 1.2s steps(6, end) infinite;
}

.voice-letter-rose {
position: absolute;
left: 50%;
top: -103px;
z-index: 2;
width: 58px;
height: 82px;
transform: translateX(-50%) rotate(var(--rose-tilt));
transform-origin: 50% 92%;
will-change: transform;
}

body.is-music-playing .voice-letter-rose {
animation: flower-sway var(--flower-sway-duration, 3.8s) ease-in-out infinite;
}

body.is-music-playing .voice-letter-rose::after {
animation: flower-bloom-sway var(--flower-sway-duration, 3.8s) ease-in-out infinite;
}

.voice-letter-rose.flower-blossom::after {
left: 18px;
top: 8px;
width: 30px;
height: 30px;
border-radius: 50% 12% 50% 12%;
background:
radial-gradient(circle at 50% 50%, rgba(255, 238, 151, .95) 0 12%, transparent 13%),
conic-gradient(from 18deg, var(--rose-light), var(--rose-color), var(--rose-light), var(--rose-color), var(--rose-light));
}

.voice-letter-rose.flower-daisy::after {
left: 15px;
top: 6px;
width: 34px;
height: 34px;
border-radius: 50%;
background:
radial-gradient(circle, rgba(229, 154, 38, .98) 0 18%, transparent 19%),
repeating-conic-gradient(rgba(255, 255, 245, .98) 0 18deg, rgba(255, 221, 122, .72) 18deg 28deg, transparent 28deg 45deg);
box-shadow: 0 0 0 1px rgba(119, 83, 40, .18);
}

.voice-letter-rose.flower-lavender::after {
left: 28px;
top: 4px;
width: 9px;
height: 44px;
border-radius: 999px;
background:
radial-gradient(circle at 50% 8%, var(--rose-light) 0 28%, transparent 30%),
radial-gradient(circle at 50% 26%, var(--rose-color) 0 28%, transparent 30%),
radial-gradient(circle at 50% 44%, var(--rose-light) 0 28%, transparent 30%),
radial-gradient(circle at 50% 62%, var(--rose-color) 0 28%, transparent 30%),
linear-gradient(var(--rose-deep), var(--rose-deep));
box-shadow: -7px 9px 0 -2px var(--rose-color), 7px 18px 0 -2px var(--rose-light);
}

.voice-letter-footer {
position: absolute;
left: 15px;
bottom: 14px;
display: flex;
flex-direction: column;
align-items: flex-start;
gap: 3px;
color: rgba(255, 250, 236, .9);
font-family: "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
font-size: clamp(10px, .95vw, 13px);
font-weight: 300;
line-height: 1.28;
letter-spacing: .1em;
text-align: left;
opacity: 0;
filter: blur(2px);
transform: translateY(5px);
text-shadow: 0 0 8px rgba(255, 236, 184, .22);
transition: opacity 1.2s ease, filter 1.2s ease, transform 1.2s ease;
}

.voice-letter-footer.is-visible {
opacity: .78;
filter: blur(0);
transform: translateY(0);
}

.voice-letter-footer-line {
display: block;
white-space: nowrap;
}

.voice-letter-footer-line:first-child {
padding-left: 6px;
color: rgba(255, 246, 214, .94);
}

.voice-letter-footer-line:last-child {
padding-left: 0;
font-size: .88em;
letter-spacing: .07em;
color: rgba(225, 236, 255, .74);
}

.voice-world-button {
position: absolute;
right: 14px;
bottom: 12px;
z-index: 6;
display: flex;
flex-direction: row;
justify-content: center;
align-items: center;
gap: 5px;
height: 24px;
width: auto;
min-width: 96px;
padding: 0 8px;
border: 1px solid rgba(255, 236, 196, .36);
border-radius: 4px;
background: rgba(255, 255, 255, .04);
backdrop-filter: blur(8px);
box-shadow: 0 0 12px rgba(255, 160, 80, .16), inset 0 0 8px rgba(255, 255, 255, .04);
color: rgba(255, 247, 228, .96);
font-family: "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
text-align: center;
text-shadow: 0 0 10px rgba(255, 200, 120, .45);
cursor: pointer;
opacity: 0;
filter: blur(2px);
transform: translateY(5px) translateX(-4px);
transition: opacity 1.2s ease .14s, filter 1.2s ease .14s, transform 1.2s ease .14s, border-color .3s ease, background .3s ease, box-shadow .3s ease;
overflow: hidden;
}

.world-house-icon {
display: block;
width: 6px;
height: 6px;
font-size: 0;
line-height: 1;
margin-bottom: 0;
background: linear-gradient(135deg, rgba(255, 247, 250, .92), rgba(255, 172, 203, .72) 52%, rgba(255, 222, 235, .68));
box-shadow: 0 0 7px rgba(255, 170, 204, .48), 0 0 13px rgba(255, 220, 235, .26);
transform: rotate(45deg) scale(.9);
animation: world-heart-breathe 2.6s ease-in-out infinite;
}

.world-house-icon::before,
.world-house-icon::after {
content: "";
position: absolute;
width: 6px;
height: 6px;
border-radius: 50%;
background: inherit;
box-shadow: inherit;
}

.world-house-icon::before {
left: -3px;
top: 0;
}

.world-house-icon::after {
left: 0;
top: -3px;
}

.world-house-title {
display: block;
font-size: 10px;
font-weight: 600;
letter-spacing: .04em;
line-height: 1;
white-space: nowrap;
}

.world-house-sub {
display: none;
margin-top: 3px;
font-size: 8px;
font-weight: 300;
letter-spacing: .02em;
line-height: 1.1;
opacity: .76;
white-space: nowrap;
}

.voice-world-button.is-visible {
opacity: .86;
filter: blur(0);
transform: translateY(0) translateX(0);
}

.voice-world-button:hover,
.voice-world-button:focus-visible {
border-color: rgba(255, 235, 192, .42);
background: rgba(255, 255, 255, .08);
box-shadow: 0 0 22px rgba(255, 170, 90, .3), inset 0 0 10px rgba(255, 255, 255, .06);
transform: translateY(-1px) translateX(0) scale(1.04);
outline: none;
}

.voice-world-button:active {
transform: translateY(0) translateX(0) scale(.98);
}

.voice-world-button.is-entering {
opacity: .24;
filter: blur(2px);
transform: translateY(-1px) translateX(0) scale(1.18);
pointer-events: none;
}

.world-house-overlay {
position: fixed;
inset: 0;
z-index: 9;
background: radial-gradient(circle at center, rgba(255, 170, 90, .25), rgba(0, 0, 0, .78));
opacity: 0;
pointer-events: none;
transition: opacity 1.2s ease;
}

.world-house-overlay.is-visible {
opacity: 1;
}

.world-house-ripple {
position: fixed;
left: 50%;
top: 50%;
z-index: 10;
width: 10px;
height: 10px;
border-radius: 50%;
background: rgba(255, 180, 90, .8);
pointer-events: none;
transform: translate(-50%, -50%) scale(0);
animation: world-house-ripple 1s ease-out forwards;
}

.world-house-star {
position: fixed;
z-index: 10;
width: 4px;
height: 4px;
border-radius: 50%;
background: rgba(255, 255, 255, .95);
box-shadow: 0 0 10px rgba(255, 255, 255, .8);
opacity: .6;

function randomLetterTilt() {
let tilt;

do {
const mode = Math.floor(Math.random() * 3);

if (mode === 0) {
tilt = Number(random(-10, -3).toFixed(1));

tilt = 0;

tilt = Number(random(3, 10).toFixed(1));
}
} while (tilt === lastLetterTilt);

lastLetterTilt = tilt;
return tilt;
}

function destroyAudioNow(audio) {
if (!audio) return;
activeMusicAudios.delete(audio);
audio.pause();
audio.src = "";
audio.load();

function cancelMusicAnimations() {
musicFadeFrames.forEach((frame) => cancelAnimationFrame(frame));
musicFadeFrames.clear();
clearTimeout(musicLoopTimer);
}

function animateAudioVolume(audio, from, to, duration, onDone) {
const startTime = performance.now();
let frame = 0;

function fade(now) {
musicFadeFrames.delete(frame);
const progress = clamp((now - startTime) / duration, 0, 1);
const easedProgress = progress * progress * (3 - 2 * progress);
audio.volume = from + (to - from) * easedProgress;
if (progress < 1) {
frame = requestAnimationFrame(fade);
musicFadeFrames.add(frame);
return;
}
if (onDone) onDone();
}

frame = requestAnimationFrame(fade);
musicFadeFrames.add(frame);
}

function syncMusicMotion() {
const isMoving = Boolean(
Array.from(activeMusicAudios).some((audio) => !audio.paused && musicVolume > 0) ||
(voiceAudio && !voiceAudio.paused && musicVolume > 0) ||
(fadingVoiceAudio && !fadingVoiceAudio.paused)
);
document.body.classList.toggle("is-music-playing", isMoving);
}

function setMusicVolume(volume) {
musicVolume = clamp(Number(volume), 0, 1);
if (voiceAudio) voiceAudio.volume = musicVolume;
if (window.audio) {
window.audio.volume = musicVolume;
if (musicVolume > 0 && window.audio.paused) {
window.audio.play().then(syncMusicMotion).catch(() => {});
}
}
syncMusicMotion();
}

function scheduleTouchGuide(delay = 2000) {

}

function dismissTouchGuide() {
const guide = document.querySelector(".touch-guide");
clearTimeout(touchGuideTimer);
clearTimeout(touchGuideDismissTimer);
clearTimeout(backgroundMusicTimer);
touchGuideShown = true;
touchGuideScheduled = false;

scheduleVoiceStarsAfterGuideRetreat();

}

scheduleVoiceStarsAfterGuideRetreat();

void guide.offsetWidth;

function armBackgroundLoop(audio, session) {
function scheduleNext() {
if (session !== musicSession || audio.dataset.nextLoopScheduled === "true") return;
if (backgroundMusicPlayCount >= backgroundMusicMaxPlays) return;
if (!Number.isFinite(audio.duration) || audio.duration <= 0) return;

audio.dataset.nextLoopScheduled = "true";
const crossfadeSeconds = Math.min(musicLoopCrossfadeDuration / 1000, Math.max(audio.duration * .32, .35));
const delay = Math.max((audio.duration - crossfadeSeconds) * 1000, 250);
musicLoopTimer = setTimeout(() => crossfadeBackgroundLoop(audio, session), delay);
}

if (Number.isFinite(audio.duration) && audio.duration > 0) {
scheduleNext();
} else {
audio.addEventListener("loadedmetadata", scheduleNext, { once: true });
}
}

function playBackgroundTrack(session, fadeDuration = musicStartFadeDuration) {
if (session !== musicSession) return;
if (backgroundMusicPlayCount >= backgroundMusicMaxPlays) return;
backgroundMusicPlayCount += 1;
const audio = new Audio(backgroundMusicSrc);
audio.loop = false;
audio.volume = 0;
audio.preload = "auto";
window.audio = audio;
activeMusicAudios.add(audio);

audio.addEventListener("ended", () => {
if (session === musicSession && window.audio === audio) {
playBackgroundTrack(session, fadeDuration);
}
if (window.audio === audio) window.audio = null;
destroyAudioNow(audio);
syncMusicMotion();
if (window.syncAudioUI) window.syncAudioUI();
}, { once: true });

audio.play().then(() => {
syncMusicMotion();
animateAudioVolume(audio, 0, musicVolume, fadeDuration);
armBackgroundLoop(audio, session);
if (window.syncAudioUI) window.syncAudioUI();
}).catch(() => {
destroyAudioNow(audio);
syncMusicMotion();
});
}

function crossfadeBackgroundLoop(currentAudio, session) {
if (session !== musicSession || !activeMusicAudios.has(currentAudio)) return;
if (backgroundMusicPlayCount >= backgroundMusicMaxPlays) return;
backgroundMusicPlayCount += 1;

const nextAudio = new Audio(backgroundMusicSrc);
nextAudio.loop = false;
nextAudio.volume = 0;
nextAudio.preload = "auto";
window.audio = nextAudio;
activeMusicAudios.add(nextAudio);

nextAudio.addEventListener("ended", () => {
if (session === musicSession && window.audio === nextAudio) {
playBackgroundTrack(session, musicLoopCrossfadeDuration);
}
if (window.audio === nextAudio) window.audio = null;
destroyAudioNow(nextAudio);
syncMusicMotion();
if (window.syncAudioUI) window.syncAudioUI();
}, { once: true });

nextAudio.play().then(() => {
syncMusicMotion();
animateAudioVolume(nextAudio, 0, musicVolume, musicLoopCrossfadeDuration);
animateAudioVolume(currentAudio, currentAudio.volume, 0, musicLoopCrossfadeDuration, () => {
destroyAudioNow(currentAudio);
syncMusicMotion();
});
armBackgroundLoop(nextAudio, session);
if (window.syncAudioUI) window.syncAudioUI();
}).catch(() => {
window.audio = currentAudio;
syncMusicMotion();
});
}

function startMusic() {
clearTimeout(backgroundMusicTimer);
cancelMusicAnimations();
Array.from(activeMusicAudios).forEach(destroyAudioNow);
activeMusicAudios.clear();
window.audio = null;
window.fadingAudio = null;
musicSession += 1;
backgroundMusicPlayCount = 0;
playBackgroundTrack(musicSession);
}

function stopMusic() {
clearTimeout(backgroundMusicTimer);
cancelMusicAnimations();
musicSession += 1;
backgroundMusicPlayCount = 0;
const audios = new Set(activeMusicAudios);
if (window.audio && window.audio !== voiceAudio && window.audio !== fadingVoiceAudio) audios.add(window.audio);
if (window.fadingAudio && window.fadingAudio !== voiceAudio && window.fadingAudio !== fadingVoiceAudio) audios.add(window.fadingAudio);
if (audios.size === 0) {
syncMusicMotion();
if (window.syncAudioUI) window.syncAudioUI();
return;
}

window.audio = null;
window.fadingAudio = null;
const fadeOutDuration = 1600;

audios.forEach((audio) => {
activeMusicAudios.add(audio);
animateAudioVolume(audio, audio.volume, 0, fadeOutDuration, () => {
destroyAudioNow(audio);
syncMusicMotion();
if (window.syncAudioUI) window.syncAudioUI();
});
});

syncMusicMotion();
if (window.syncAudioUI) window.syncAudioUI();
}

function startVoiceMusic() {
if (voiceMusicList.length === 0) return;

clearTimeout(voiceMusicStartTimer);
cancelAnimationFrame(voiceMusicFadeFrame);
destroyAudioNow(voiceAudio);
destroyAudioNow(fadingVoiceAudio);
voiceAudio = null;
fadingVoiceAudio = null;

const src = voiceMusicList[voiceMusicIndex % voiceMusicList.length];
voiceMusicIndex += 1;
const audio = new Audio(src);
voiceAudio = audio;
window.audio = audio;
audio.loop = true;
audio.volume = 0;
audio.play().then(() => {
syncMusicMotion();
const startTime = performance.now();

function fadeIn(now) {
const progress = clamp((now - startTime) / 2000, 0, 1);
audio.volume = musicVolume * progress;
if (progress < 1 && voiceAudio === audio) {
voiceMusicFadeFrame = requestAnimationFrame(fadeIn);
}
}

voiceMusicFadeFrame = requestAnimationFrame(fadeIn);
if (window.syncAudioUI) window.syncAudioUI();
}).catch(() => {
if (voiceAudio === audio) voiceAudio = null;
if (window.audio === audio) window.audio = null;
destroyAudioNow(audio);
syncMusicMotion();
if (window.syncAudioUI) window.syncAudioUI();
});
}

function scheduleVoiceMusicStart(delay = voiceMusicStartDelay) {
clearTimeout(voiceMusicStartTimer);
voiceMusicStartTimer = setTimeout(() => {
startVoiceMusic();
}, delay);
}

function stopVoiceMusic() {
clearTimeout(voiceMusicStartTimer);
const audio = voiceAudio;
if (!audio) return;

cancelAnimationFrame(voiceMusicFadeFrame);
voiceAudio = null;
if (window.audio === audio) window.audio = null;
fadingVoiceAudio = audio;
const startVolume = audio.volume;
const startTime = performance.now();
const fadeOutDuration = 1600;

function fadeOut(now) {
const progress = clamp((now - startTime) / fadeOutDuration, 0, 1);
const easedProgress = progress * progress * (3 - 2 * progress);
audio.volume = startVolume * (1 - easedProgress);
if (progress < 1) {
voiceMusicFadeFrame = requestAnimationFrame(fadeOut);
return;
}
destroyAudioNow(audio);
if (fadingVoiceAudio === audio) fadingVoiceAudio = null;
syncMusicMotion();
if (window.syncAudioUI) window.syncAudioUI();
}

syncMusicMotion();
voiceMusicFadeFrame = requestAnimationFrame(fadeOut);
}

window.stopMusic = stopMusic;
window.startMusic = startMusic;
window.stopVoiceMusic = stopVoiceMusic;
window.startVoiceMusic = startVoiceMusic;
window.syncMusicMotion = syncMusicMotion;
window.destroyAudioNow = destroyAudioNow;
window.setMusicVolume = setMusicVolume;
window.getMusicVolume = getMusicVolume;

function prepareTypingKeySounds() {
if (typingKeyAudio) return;

typingKeyAudio = new Audio(typingKeySoundSrc);
typingKeyAudio.preload = "auto";
typingKeyAudio.volume = typingKeyVolume;
typingKeyAudio.load();
}

function unlockTypingKeySounds() {
prepareTypingKeySounds();
if (!typingKeyAudio) return;

typingKeyAudio.muted = false;
typingKeyAudio.volume = typingKeyVolume;
typingKeyAudio.currentTime = 0;
typingKeyAudio.play().then(() => {
setTimeout(() => {
typingKeyAudio.pause();
typingKeyAudio.currentTime = 0;
typingKeyAudio.volume = typingKeyVolume;
}, 180);
}).catch(() => {
typingKeyAudio.muted = false;
});
}

function playTypingKeySound() {
prepareTypingKeySounds();
if (!typingKeyAudio) return;

typingKeyAudio.pause();
typingKeyAudio.currentTime = typingKeyStartAt;
typingKeyAudio.volume = typingKeyVolume;
typingKeyAudio.muted = false;
typingKeyAudio.loop = true;
typingKeyAudio.playbackRate = 1;
typingKeyAudio.play().catch(() => {});
}

function stopTypingKeySound() {
if (!typingKeyAudio) return;
typingKeyAudio.pause();
typingKeyAudio.currentTime = typingKeyStartAt;
}

function earthPoint() {
const rect = earth.getBoundingClientRect();
const radius = Math.min(rect.width, rect.height) * .5;
const centerX = rect.left + rect.width * .5;
const centerY = rect.top + rect.height * .5;
let x;
let y;

if (Math.random() < .84) {
const zone = brightZones[Math.floor(Math.random() * brightZones.length)];
const angle = random(0, Math.PI * 2);
const distance = Math.sqrt(Math.random()) * zone.r;
x = zone.x + Math.cos(angle) * distance;
y = zone.y + Math.sin(angle) * distance;
} else {
const angle = random(0, Math.PI * 2);
const distance = Math.sqrt(Math.random()) * .42;
x = .5 + Math.cos(angle) * distance;
y = .5 + Math.sin(angle) * distance;
}

x = clamp(x, .12, .88);
y = clamp(y, .12, .88);
const px = rect.left + rect.width * x;
const py = rect.top + rect.height * y;
const outward = Math.atan2(py - centerY, px - centerX);
const freeAngle = Math.random() < .28 ? random(0, Math.PI * 2) : outward + random(-1.15, 1.15);
const distance = random(radius * 1.35, Math.max(window.innerWidth, window.innerHeight) * .58);

return {
x: px,
y: py,
angle: freeAngle,
distance,
radius
};
}

function spawnVoiceStar() {
if (stars.size >= 28) return;

const start = earthPoint();
const palette = colors[Math.floor(Math.random() * colors.length)];
const size = random(8.4, 14.7);
const life = random(25000, 35000);
const hold = random(1700, 3800);
const grow = random(4300, 6600);
const sway = random(7, 18);
const endX = start.x + Math.cos(start.angle) * start.distance;
const endY = start.y + Math.sin(start.angle) * start.distance;
const element = document.createElement("button");

element.type = "button";
element.className = "voice-star";
element.setAttribute("aria-label", "打开一颗心声光星");
element.style.setProperty("--voice-size", `${size}px`);
element.style.setProperty("--voice-color", palette[0]);
element.style.setProperty("--voice-glow", palette[1]);
element.style.setProperty("--voice-haze", palette[2]);
element.style.setProperty("--voice-core", palette[3]);
element.style.setProperty("--voice-deep", palette[4]);
element.innerHTML = '<span class="voice-star-shape"></span>';
layer.appendChild(element);

const star = {
element,
startX: start.x,
startY: start.y,
endX,
endY,
life,
hold,
grow,
sway,
phase: random(0, Math.PI * 2),
breathePower: random(.36, .58),
born: performance.now(),
clicked: false,
heartStarNo: String(++heartStarCounter).padStart(4, "0"),
message: messages[Math.floor(Math.random() * messages.length)],
origin: origins[Math.floor(Math.random() * origins.length)]
};

element.addEventListener("click", () => openVoiceBottle(star), { once: true });
stars.add(star);
}

function formatLetterTime() {
const now = new Date();
const date = now.toLocaleDateString("zh-CN", {
year: "numeric",
month: "2-digit",
day: "2-digit"
});
const time = now.toLocaleTimeString("zh-CN", {
hour: "2-digit",
minute: "2-digit"
});
return `${date} ${time}`;
}

function closeActiveVoiceExperience() {
if (!activeVoiceExperience) return;
activeVoiceExperience.close();
}

function openVoiceBottle(star){if(star.clicked)return;if(!window.l){playOpeningLaughSound();return}dismissTouchGuide();closeActiveVoiceExperience();stopMusic();playStarClickSound();scheduleVoiceMusicStart();unlockTypingKeySounds();star.clicked=true;star.element.classList.add("is-touched");

let bottle = null;
let typeTimer = 0;
let startTypewriter = 0;
let closed = false;
function stopTyping() {
clearInterval(typeTimer);
if (bottle) {
const textNode = bottle.querySelector(".voice-letter-text");
if (textNode) textNode.classList.remove("is-typing");
}
stopTypingKeySound();
}
function closeCard() {
if (closed) return;
closed = true;
clearTimeout(cardTimer);
clearTimeout(startTypewriter);
stopTyping();
stopVoiceMusic();
star.element.remove();
stars.delete(star);
if (activeVoiceExperience && activeVoiceExperience.close === closeCard) {
activeVoiceExperience = null;
}
if (!bottle) return;

bottle.classList.add("is-closing");
setTimeout(() => {
bottle.remove();
}, 2000);
}

activeVoiceExperience = { close: closeCard };

const cardTimer = setTimeout(() => {
if (closed) return;
bottle = document.createElement("div");
const safeMessage = star.message.replace(/[&<>"']/g, (char) => ({
"&": "&amp;",
"<": "&lt;",
">": "&gt;",
'"': "&quot;",
"'": "&#39;"
}[char]));
const safeOrigin = star.origin.replace(/[&<>"']/g, (char) => ({
"&": "&amp;",
"<": "&lt;",
">": "&gt;",
'"': "&quot;",
"'": "&#39;"
}[char]));
const safeHeartStarNo = star.heartStarNo.replace(/[&<>"']/g, (char) => ({
"&": "&amp;",
"<": "&lt;",
">": "&gt;",
'"': "&quot;",
"'": "&#39;"
}[char]));
const safeTime = formatLetterTime().replace(/[&<>"']/g, (char) => ({
"&": "&amp;",
"<": "&lt;",
">": "&gt;",
'"': "&quot;",
"'": "&#39;"
}[char]));

bottle.className = "voice-bottle";
const bottleStartX = star.currentX || star.startX;
const bottleStartY = star.currentY || star.startY;
bottle.style.setProperty("--bottle-x", `${bottleStartX}px`);
bottle.style.setProperty("--bottle-y", `${bottleStartY}px`);
const arriveSeconds = random(6, 8);
bottle.style.setProperty("--bottle-arrive", `${arriveSeconds.toFixed(2)}s`);
bottle.style.setProperty("--letter-delay", `${(arriveSeconds + .32).toFixed(2)}s`);
bottle.style.setProperty("--letter-tilt", "24deg");
bottle.style.setProperty("--hand-font", handFonts[Math.floor(Math.random() * handFonts.length)]);
bottle.style.setProperty("--hand-letter-spacing", `${random(.01, .09).toFixed(3)}em`);
bottle.style.setProperty("--hand-line-height", random(1.55, 1.92).toFixed(2));
bottle.style.setProperty("--hand-skew", `${random(-4, 4).toFixed(1)}deg`);
bottle.style.setProperty("--hand-color", `rgba(${Math.round(random(48, 86))}, ${Math.round(random(30, 54))}, ${Math.round(random(18, 36))}, ${random(.66, .94).toFixed(2)})`);
const rosePalette = rosePalettes[Math.floor(Math.random() * rosePalettes.length)];
bottle.style.setProperty("--rose-light", rosePalette[0]);
bottle.style.setProperty("--rose-color", rosePalette[1]);
bottle.style.setProperty("--rose-deep", rosePalette[2]);
bottle.style.setProperty("--rose-tilt", "0deg");
bottle.style.setProperty("--rose-bloom-tilt", "0deg");
bottle.style.setProperty("--flower-sway-angle", `${random(2.8, 5.2).toFixed(1)}deg`);
bottle.style.setProperty("--flower-sway-duration", `${random(3.2, 4.8).toFixed(2)}s`);
const flowerClass = flowerClasses[Math.floor(Math.random() * flowerClasses.length)];
bottle.innerHTML = `
<button class="voice-bottle-close" type="button" aria-label="关闭卡片并结束体验">×</button>
<div class="voice-bottle-glass"></div>
<div class="voice-bottle-shine"></div>
<span class="voice-bottle-sparkle one"></span>
<span class="voice-bottle-sparkle two"></span>
<span class="voice-letter-rose ${flowerClass}"><i></i></span>
<div class="voice-letter">
<span class="voice-letter-text" aria-label="${safeMessage}"></span>
<span class="voice-letter-footer">
<span class="voice-letter-footer-line">—— 心星号 ${safeHeartStarNo}</span>
<span class="voice-letter-footer-line">${safeOrigin} · ${safeTime}</span>
</span>
<button class="voice-world-button" type="button" aria-label="进入ta的世界">
<span class="world-house-icon" aria-hidden="true"></span>
<span class="world-house-title">进入ta的世界</span>
</button>
</div>
<div class="voice-bottle-heart-rays"></div>
<div class="voice-bottle-heart"><span class="diamond-facet"></span></div>
<div class="voice-bottle-tie"></div>`;
document.body.appendChild(bottle);

const letterNode = bottle.querySelector(".voice-letter");
const textNode = bottle.querySelector(".voice-letter-text");
const footerNode = bottle.querySelector(".voice-letter-footer");
const worldButton = bottle.querySelector(".voice-world-button");
const prevButton = bottle.querySelector(".voice-page-prev");
const nextButton = bottle.querySelector(".voice-page-next");
const pageStatus = bottle.querySelector(".voice-page-status");
const messageChars = Array.from(star.message);
const pageSize = 36;
const pages = [];
for (let index = 0; index < messageChars.length; index += pageSize) {
pages.push(messageChars.slice(index, index + pageSize).join(""));
}
if (pages.length > 1) {
letterNode.classList.add("has-pages");
}
const typeStart = (arriveSeconds + 1.55) * 1000;
let typeIndex = 0;
let currentPage = 0;
function renderPage(pageIndex) {
stopTyping();
currentPage = clamp(pageIndex, 0, pages.length - 1);
textNode.innerHTML = "";
if (footerNode) footerNode.classList.remove("is-visible");
if (worldButton) worldButton.classList.remove("is-visible");
const pageChars = Array.from(pages[currentPage]);
typeIndex = 0;
if (pageStatus) pageStatus.textContent = `${currentPage + 1} / ${pages.length}`;
if (prevButton) prevButton.disabled = currentPage === 0;
if (nextButton) nextButton.disabled = currentPage === pages.length - 1;
textNode.classList.add("is-typing");
playTypingKeySound();
typeTimer = setInterval(() => {
const charSpan = document.createElement("span");
charSpan.textContent = pageChars[typeIndex];
charSpan.style.setProperty("--char-x", `${random(-.8, .8).toFixed(2)}px`);
charSpan.style.setProperty("--char-y", `${random(-1.2, 1.2).toFixed(2)}px`);
charSpan.style.setProperty("--char-rotate", `${random(-2.2, 2.2).toFixed(2)}deg`);
textNode.appendChild(charSpan);
typeIndex += 1;
if (typeIndex >= pageChars.length) {
stopTyping();
if (footerNode) footerNode.classList.add("is-visible");
if (worldButton) worldButton.classList.add("is-visible");
}
}, 300);
}
startTypewriter = setTimeout(() => {
renderPage(0);
}, typeStart);

if (prevButton) prevButton.addEventListener("click", () => renderPage(currentPage - 1));
if (nextButton) nextButton.addEventListener("click", () => renderPage(currentPage + 1));
if (worldButton) worldButton.addEventListener("transitionend", (event) => {
if (event.propertyName !== "opacity" || !worldButton.classList.contains("is-visible")) return;
setTimeout(() => {
if (closed || !worldButton.isConnected) return;
worldButton.classList.remove("is-visible");
}, 4000);
}, { once: true });
if (worldButton) worldButton.addEventListener("click", (event) => {
event.stopPropagation();
worldButton.blur();
playWorldHouseEnter(worldButton);
});

bottle.querySelector(".voice-bottle-close").addEventListener("click", () => {
closeCard();
});
setTimeout(() => {
star.element.remove();
stars.delete(star);
}, 220);
}, 2000);
}

function updateVoiceStars(now) {
if (voiceStarsEnabled && now > nextSpawn) {
spawnVoiceStar();
nextSpawn = now + random(880, 1900);
}

stars.forEach((star) => {
const age = now - star.born;
const progress = age / star.life;

if (progress >= 1 || star.clicked) {
if (!star.clicked) star.element.remove();
stars.delete(star);
return;
}

const moveProgress = clamp((age - star.hold) / (star.life - star.hold), 0, 1);
const easeMove = 1 - Math.pow(1 - moveProgress, 2.35);
const growProgress = clamp((age - star.hold) / star.grow, 0, 1);
const fadeIn = clamp(age / star.hold, 0, 1);
const fadeOut = clamp((1 - progress) / .26, 0, 1);
const breathe = .82 + Math.sin(now / 980 + star.phase) * star.breathePower;
const swayX = Math.sin(moveProgress * Math.PI * 3.3 + star.phase) * star.sway * moveProgress;
const swayY = Math.cos(moveProgress * Math.PI * 2.6 + star.phase) * star.sway * .52 * moveProgress;
const x = star.startX + (star.endX - star.startX) * easeMove + swayX;
const y = star.startY + (star.endY - star.startY) * easeMove + swayY;
const scale = (.22 + growProgress * 1.34) * (1 - progress * .36) * (1 + (breathe - .82) * .28);
const opacity = clamp(fadeIn * fadeOut * (.62 + breathe * .58), 0, 1);

star.currentX = x;
star.currentY = y;
star.element.style.opacity = opacity.toFixed(3);
star.element.style.transform = `translate3d(${x}px, ${y}px, 0) translate(-50%, -50%) scale(${scale.toFixed(3)})`;
star.element.style.filter = `brightness(${(1.12 + breathe * 1.02).toFixed(2)}) saturate(1.48)`;
});

requestAnimationFrame(updateVoiceStars);
}

setTimeout(playOpeningLaughSound, 500);
requestAnimationFrame(updateVoiceStars);
})();
</script>
<script>
(() => {
if (window.__audioUIBound) return;
window.__audioUIBound = true;

const btn = document.getElementById("audioToggleBtn");
const slider = document.getElementById("audioVolumeSlider");

if (!btn || !slider) return;

function syncUI() {
if (!window.audio) {
btn.innerText = "🔇";
return;
}

const currentVolume = window.getMusicVolume ? window.getMusicVolume() : Number(slider.value);
btn.innerText = window.audio.paused || currentVolume <= 0 ? "🔇" : "🔊";
}

window.syncAudioUI = syncUI;

btn.onclick = function () {
if (!window.audio) {
if (window.startMusic) {
window.startMusic();
setTimeout(syncUI, 120);
}
return;
}

if (window.audio.paused) {
window.audio.play().then(() => {
if (window.syncMusicMotion) window.syncMusicMotion();
syncUI();
}).catch(syncUI);
} else {
window.audio.pause();
if (window.syncMusicMotion) window.syncMusicMotion();
syncUI();
return;
}

syncUI();
};

slider.oninput = function () {
if (window.setMusicVolume) window.setMusicVolume(slider.value);
syncUI();
};

setTimeout(syncUI, 300);
})();
</script>
