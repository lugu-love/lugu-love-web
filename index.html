<!doctype html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Earth Voice V4.1</title>
  <style>
    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #000;
    }

    body {
      position: fixed;
      inset: 0;
      user-select: none;
    }

    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
    }
  </style>
</head>
<body>
  <canvas id="space" aria-label="Earth Voice V4.1"></canvas>

  <script>
    (() => {
      const canvas = document.getElementById("space");
      const ctx = canvas.getContext("2d");
      const earthImage = new Image();
      const spaceImage = new Image();

      earthImage.src = "earth.png";
      spaceImage.src = "space-bg.jpg";

      const bgStars = [];
      const souls = [];
      const mouse = { x: 0, y: 0, active: false };
      const earth = { x: 0, y: 0, r: 120 };

      let width = 0;
      let height = 0;
      let dpr = 1;
      let lastTime = performance.now();

      const rand = (min, max) => min + Math.random() * (max - min);
      const clamp = (value, min, max) => Math.max(min, Math.min(max, value));

      class SoulStar {
        constructor() {
          this.reset(true);
        }

        reset(anywhere = false) {
          const angle = rand(0, Math.PI * 2);
          const distance = anywhere ? rand(0, Math.max(width, height) * 0.7) : rand(earth.r * 0.8, Math.max(width, height) * 0.45);

          this.x = anywhere ? Math.random() * width : earth.x + Math.cos(angle) * distance;
          this.y = anywhere ? Math.random() * height : earth.y + Math.sin(angle) * distance;
          this.vx = rand(-0.4, 0.4);
          this.vy = rand(-0.4, 0.4);
          this.size = rand(1, 3);
          this.baseSize = this.size;
          this.hue = rand(200, 280);
          this.life = rand(1000, 2000);
          this.phase = rand(0, Math.PI * 2);
        }

        update(delta) {
          const dt = delta / 16.67;
          this.life -= dt;

          const dx = mouse.x - this.x;
          const dy = mouse.y - this.y;
          const dist = Math.sqrt(dx * dx + dy * dy) || 1;

          if (mouse.active && dist < 220) {
            const force = (1 - dist / 220) * 0.04;
            this.vx += dx * force * dt;
            this.vy += dy * force * dt;
            this.size = Math.min(4, this.size + 0.03 * dt);
          } else {
            this.size += (this.baseSize - this.size) * 0.04 * dt;
          }

          this.x += this.vx * dt;
          this.y += this.vy * dt;
          this.vx *= Math.pow(0.97, dt);
          this.vy *= Math.pow(0.97, dt);

          if (
            this.life <= 0 ||
            this.x < -80 ||
            this.x > width + 80 ||
            this.y < -80 ||
            this.y > height + 80
          ) {
            this.reset();
          }
        }

        draw(time) {
          const alpha = clamp(0.22 + Math.sin(time * 0.002 + this.x * 0.02 + this.phase) * 0.28, 0.05, 0.68);
          const glow = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.size * 8);

          glow.addColorStop(0, `hsla(${this.hue},100%,72%,${alpha})`);
          glow.addColorStop(0.42, `hsla(${this.hue},100%,62%,${alpha * 0.35})`);
          glow.addColorStop(1, `hsla(${this.hue},100%,50%,0)`);

          ctx.fillStyle = glow;
          ctx.beginPath();
          ctx.arc(this.x, this.y, this.size * 3, 0, Math.PI * 2);
          ctx.fill();
        }
      }

      function resize() {
        dpr = Math.min(window.devicePixelRatio || 1, 2);
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = Math.floor(width * dpr);
        canvas.height = Math.floor(height * dpr);
        canvas.style.width = `${width}px`;
        canvas.style.height = `${height}px`;
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

        earth.x = width / 2;
        earth.y = height / 2;
        earth.r = Math.min(width, height) * 0.25;
        mouse.x = mouse.x || earth.x;
        mouse.y = mouse.y || earth.y;

        createBackgroundStars();
        createSoulStars();
      }

      function createBackgroundStars() {
        bgStars.length = 0;
        const count = Math.round(clamp((width * height) / 3600, 160, 320));

        for (let i = 0; i < count; i += 1) {
          bgStars.push({
            x: Math.random() * width,
            y: Math.random() * height,
            r: rand(0.25, 1.5),
            base: rand(0.12, 0.5),
            phase: rand(0, Math.PI * 2),
            speed: rand(0.55, 1.25)
          });
        }
      }

      function createSoulStars() {
        souls.length = 0;
        const count = Math.round(clamp((width * height) / 6400, 120, 190));

        for (let i = 0; i < count; i += 1) {
          souls.push(new SoulStar());
        }
      }

      function drawCoverImage(image, alpha) {
        if (!image.complete || !image.naturalWidth) {
          return;
        }

        const imageRatio = image.naturalWidth / image.naturalHeight;
        const viewRatio = width / height;
        let drawWidth = width;
        let drawHeight = height;
        let dx = 0;
        let dy = 0;

        if (imageRatio > viewRatio) {
          drawWidth = height * imageRatio;
          dx = (width - drawWidth) / 2;
        } else {
          drawHeight = width / imageRatio;
          dy = (height - drawHeight) / 2;
        }

        ctx.globalAlpha = alpha;
        ctx.drawImage(image, dx, dy, drawWidth, drawHeight);
        ctx.globalAlpha = 1;
      }

      function drawSpaceBase() {
        ctx.fillStyle = "rgba(0,0,0,0.25)";
        ctx.fillRect(0, 0, width, height);

        drawCoverImage(spaceImage, 0.18);

        const vignette = ctx.createRadialGradient(width / 2, height / 2, 0, width / 2, height / 2, Math.max(width, height) * 0.72);
        vignette.addColorStop(0, "rgba(0,0,0,0)");
        vignette.addColorStop(1, "rgba(0,0,0,0.74)");
        ctx.fillStyle = vignette;
        ctx.fillRect(0, 0, width, height);
      }

      function drawBackgroundStars(time) {
        for (const star of bgStars) {
          const flicker = Math.sin(time * 0.001 * star.speed + star.phase) * 0.5;
          const alpha = clamp(star.base + flicker * 0.35, 0.03, 0.92);

          ctx.beginPath();
          ctx.fillStyle = `rgba(255,255,255,${alpha})`;
          ctx.arc(star.x, star.y, star.r, 0, Math.PI * 2);
          ctx.fill();
        }
      }

      function drawEarth(time) {
        const rotation = time * 0.000105;
        const r = earth.r;

        ctx.save();
        ctx.beginPath();
        ctx.arc(earth.x, earth.y, r, 0, Math.PI * 2);
        ctx.clip();
        ctx.translate(earth.x, earth.y);
        ctx.rotate(rotation);

        if (earthImage.complete && earthImage.naturalWidth) {
          const cropSize = earthImage.naturalWidth * 0.78;
          const cropX = earthImage.naturalWidth * 0.11;
          const cropY = earthImage.naturalHeight * 0.32;
          ctx.drawImage(earthImage, cropX, cropY, cropSize, cropSize, -r, -r, r * 2, r * 2);
        } else {
          drawFallbackEarth(r);
        }

        ctx.restore();

        ctx.beginPath();
        ctx.arc(earth.x, earth.y, r + 1, 0, Math.PI * 2);
        ctx.strokeStyle = "rgba(120,180,255,0.42)";
        ctx.lineWidth = Math.max(1, r * 0.01);
        ctx.stroke();
      }

      function drawFallbackEarth(radius) {
        const ocean = ctx.createRadialGradient(-radius * 0.3, -radius * 0.28, radius * 0.1, 0, 0, radius);
        ocean.addColorStop(0, "#62bcff");
        ocean.addColorStop(0.5, "#145ea4");
        ocean.addColorStop(1, "#03142d");

        ctx.fillStyle = ocean;
        ctx.beginPath();
        ctx.arc(0, 0, radius, 0, Math.PI * 2);
        ctx.fill();
      }

      function animate(time) {
        const delta = Math.min(time - lastTime, 50);
        lastTime = time;

        drawSpaceBase();
        drawBackgroundStars(time);

        ctx.globalCompositeOperation = "lighter";
        for (const soul of souls) {
          soul.update(delta);
          soul.draw(time);
        }
        ctx.globalCompositeOperation = "source-over";

        drawEarth(time);
        requestAnimationFrame(animate);
      }

      document.addEventListener("mousemove", (event) => {
        mouse.x = event.clientX;
        mouse.y = event.clientY;
        mouse.active = true;
      }, { passive: true });

      document.addEventListener("touchmove", (event) => {
        if (!event.touches.length) {
          return;
        }
        mouse.x = event.touches[0].clientX;
        mouse.y = event.touches[0].clientY;
        mouse.active = true;
      }, { passive: true });

      document.addEventListener("mouseleave", () => {
        mouse.active = false;
      }, { passive: true });

      window.addEventListener("resize", resize, { passive: true });

      resize();
      requestAnimationFrame((time) => {
        lastTime = time;
        animate(time);
      });
    })();
  </script>
</body>
</html>
