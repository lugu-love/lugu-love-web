<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Space V1.6</title>

<style>
* {
box-sizing: border-box;
}

html,
body {
width: 100%;
min-height: 100%;
margin: 0;
}

body {
font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
color: #fff;
background: #070915;
overflow: hidden;
transition: background 2s ease;
}

body::before {
content: "";
position: fixed;
inset: 0;
background:
radial-gradient(circle at 20% 18%, rgba(255, 255, 255, .18), transparent 22%),
radial-gradient(circle at 78% 70%, rgba(108, 199, 255, .18), transparent 24%),
radial-gradient(circle, rgba(255, 255, 255, .78) 0 1px, transparent 1.6px);
background-size: auto, auto, 82px 82px;
opacity: .42;
pointer-events: none;
transition: opacity 1s ease;
}

body.is-generated::before {
opacity: .62;
}

.screen {
position: relative;
z-index: 1;
width: 100%;
min-height: 100vh;
padding: max(24px, env(safe-area-inset-top)) max(18px, env(safe-area-inset-right)) max(24px, env(safe-area-inset-bottom)) max(18px, env(safe-area-inset-left));
}

.control {
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
min-height: 100vh;
gap: 16px;
text-align: center;
opacity: 1;
transition: opacity 1s ease;
}

.control.is-leaving {
opacity: 0;
pointer-events: none;
}

.title {
margin: 0 0 8px;
font-size: clamp(26px, 7vw, 44px);
line-height: 1.08;
letter-spacing: .08em;
text-shadow: 0 0 24px rgba(255, 231, 184, .32);
}

.subtitle {
margin: 0 0 8px;
font-size: 12px;
font-weight: 600;
letter-spacing: .2em;
color: rgba(255, 244, 214, .72);
}

.btn {
width: min(80vw, 320px);
min-height: 54px;
padding: 15px 18px;
border: 0;
border-radius: 14px;
background: linear-gradient(135deg, #ff4d6d, #ffb703);
box-shadow: 0 18px 42px rgba(0, 0, 0, .28), 0 0 24px rgba(255, 183, 70, .22);
color: #fff;
font-size: 15px;
font-weight: 700;
letter-spacing: .04em;
cursor: pointer;
transition: transform .24s ease, filter .24s ease;
}

.btn:hover,
.btn:focus-visible {
transform: translateY(-2px);
filter: brightness(1.06);
outline: none;
}

.styles {
width: min(86vw, 360px);
display: flex;
flex-wrap: wrap;
justify-content: center;
gap: 8px;
}

.tag {
min-width: 58px;
padding: 7px 12px;
border-radius: 999px;
border: 1px solid rgba(255, 255, 255, .3);
background: rgba(255, 255, 255, .08);
backdrop-filter: blur(12px);
color: rgba(255, 255, 255, .9);
font-size: 12px;
font-weight: 650;
cursor: pointer;
transition: background .24s ease, border-color .24s ease, transform .24s ease;
}

.tag:hover,
.tag:focus-visible,
.tag.is-active {
border-color: rgba(255, 255, 255, .7);
background: rgba(255, 255, 255, .18);
transform: translateY(-1px);
outline: none;
}

.loading {
position: absolute;
left: 0;
top: 45%;
z-index: 2;
width: 100%;
padding: 0 20px;
text-align: center;
opacity: 0;
transform: translateY(8px);
transition: opacity 1s ease, transform 1s ease;
font-size: 14px;
letter-spacing: .08em;
text-shadow: 0 0 18px rgba(255, 231, 184, .34);
pointer-events: none;
}

.loading.is-visible {
opacity: 1;
transform: translateY(0);
}

.space {
display: none;
min-height: 100vh;
align-items: center;
justify-content: center;
flex-direction: column;
gap: 18px;
text-align: center;
}

.space.is-visible {
display: flex;
}

.card {
width: min(84vw, 420px);
padding: clamp(22px, 6vw, 34px);
border: 1px solid rgba(255, 255, 255, .18);
border-radius: 16px;
background: rgba(255, 255, 255, .08);
backdrop-filter: blur(14px);
box-shadow: inset 0 0 28px rgba(255, 255, 255, .05), 0 22px 60px rgba(0, 0, 0, .28);
font-size: clamp(20px, 5vw, 30px);
font-weight: 700;
line-height: 1.45;
letter-spacing: .06em;
word-break: break-word;
opacity: 0;
transform: translateY(20px);
transition: opacity 1.5s ease, transform 1.5s ease;
}

.card.show {
opacity: 1;
transform: translateY(0);
}

.back {
position: fixed;
top: max(20px, env(safe-area-inset-top));
left: max(20px, env(safe-area-inset-left));
z-index: 3;
display: none;
min-height: 40px;
padding: 10px 14px;
border: 0;
border-radius: 999px;
background: rgba(255, 255, 255, .2);
backdrop-filter: blur(10px);
box-shadow: 0 10px 28px rgba(0, 0, 0, .18);
color: #fff;
font-size: 14px;
font-weight: 650;
cursor: pointer;
}

.back.is-visible {
display: block;
}

@media (max-width: 520px) {
.control,
.space {
min-height: calc(100vh - 48px);
}

.card {
width: 100%;
}
}
</style>
</head>

<body>

<main class="screen">
<button class="back" id="backBtn" type="button" onclick="back()">← 返回</button>

<section class="control" id="control" aria-label="我的空间生成控制">
<p class="subtitle">MY SPACE V1.6</p>
<h1 class="title">我的空间</h1>

<button class="btn" type="button" onclick="generate()">
✨ 一键生成我的空间
</button>

<div class="styles" aria-label="选择空间风格">
<button class="tag is-active" type="button" data-style="star" onclick="setStyle('star')">星空</button>
<button class="tag" type="button" data-style="sunset" onclick="setStyle('sunset')">日落</button>
<button class="tag" type="button" data-style="ocean" onclick="setStyle('ocean')">海洋</button>
<button class="tag" type="button" data-style="forest" onclick="setStyle('forest')">森林</button>
<button class="tag" type="button" data-style="dream" onclick="setStyle('dream')">梦境</button>
</div>
</section>

<div class="loading" id="loading">✨ 正在进入你的空间...</div>

<section class="space" id="space" aria-live="polite">
<div class="card" id="card">
✨ 你的专属空间
</div>
</section>
</main>

<script>
const styleMap = {
star: {
name: "星空",
background: "radial-gradient(circle at 50% 28%, rgba(83, 202, 255, .24), transparent 34%), linear-gradient(135deg, #050814, #0b1320 58%, #1c2541)"
},
sunset: {
name: "日落",
background: "radial-gradient(circle at 50% 24%, rgba(255, 229, 126, .46), transparent 34%), linear-gradient(135deg, #461220, #ff7b00 58%, #ff4d6d)"
},
ocean: {
name: "海洋",
background: "radial-gradient(circle at 45% 28%, rgba(144, 224, 239, .38), transparent 34%), linear-gradient(135deg, #03045e, #0077b6 58%, #48cae4)"
},
forest: {
name: "森林",
background: "radial-gradient(circle at 42% 24%, rgba(183, 228, 199, .32), transparent 34%), linear-gradient(135deg, #081c15, #1b4332 58%, #40916c)"
},
dream: {
name: "梦境",
background: "radial-gradient(circle at 50% 30%, rgba(255, 190, 250, .38), transparent 34%), linear-gradient(135deg, #240046, #5a189a 58%, #f15bb5)"
}
};

let style = localStorage.getItem("style") || "star";

if (!styleMap[style]) {
style = "star";
localStorage.setItem("style", style);
}

function syncActiveStyle() {
document.querySelectorAll(".tag").forEach((tag) => {
tag.classList.toggle("is-active", tag.dataset.style === style);
});
}

function setStyle(nextStyle) {
if (!styleMap[nextStyle]) return;
style = nextStyle;
localStorage.setItem("style", style);
syncActiveStyle();
}

function generate() {
showLoading();

setTimeout(() => {
enterSpace();
}, 1200);
}

function showLoading() {
document.getElementById("loading").classList.add("is-visible");
document.getElementById("control").classList.add("is-leaving");
}

function enterSpace() {
const selectedStyle = styleMap[style] || styleMap.star;
const loading = document.getElementById("loading");
const control = document.getElementById("control");
const space = document.getElementById("space");
const card = document.getElementById("card");
const backBtn = document.getElementById("backBtn");

document.body.style.background = selectedStyle.background;
document.body.classList.add("is-generated");

loading.classList.remove("is-visible");
control.style.display = "none";
space.classList.add("is-visible");
backBtn.classList.add("is-visible");

setTimeout(() => {
card.innerText = `✨ 你的${selectedStyle.name}专属空间`;
card.classList.add("show");
}, 300);
}

function back() {
const loading = document.getElementById("loading");
const control = document.getElementById("control");
const space = document.getElementById("space");
const card = document.getElementById("card");
const backBtn = document.getElementById("backBtn");

space.classList.remove("is-visible");
backBtn.classList.remove("is-visible");
card.classList.remove("show");
card.innerText = "✨ 你的专属空间";

control.style.display = "flex";
requestAnimationFrame(() => {
control.classList.remove("is-leaving");
});

loading.classList.remove("is-visible");
document.body.classList.remove("is-generated");
document.body.style.background = "#070915";
}

syncActiveStyle();
</script>

</body>
</html>
